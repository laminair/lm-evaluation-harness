# RouterLM Configuration Example
# This file configures a multi-model router that can route requests between
# different LLMs based on a callback function.
#
# Usage:
#   lm-eval run --router_config examples/router_config.yaml --tasks hellaswag

# Model definitions - each model is identified by a unique ID
models:
  # Small fast model for simple queries
  small_model:
    type: hf
    pretrained: gpt2
    dtype: float32
  
  # Larger model for complex queries
  large_model:
    type: hf
    pretrained: gpt2-medium
    dtype: float32

# Routing configuration
routing:
  # Default primary model (required)
  primary_model: small_model
  
  # Shadow routing mode:
  # - "none": No shadow routing (only primary model runs)
  # - "all": Run all models on every request
  # - "sampled": Randomly sample shadow models
  shadow_mode: none
  
  # When shadow_mode is "sampled", this fraction of available models
  # will be randomly selected as shadow models (0.0 to 1.0)
  shadow_sample_rate: 0.5
  
  # Enable adaptive mode - provides feedback to router after each evaluation
  # When true, the router can learn from outcomes during the evaluation run
  adaptive: false
  
  # Callback function for routing decisions (optional)
  # Format: "module.path:function_name"
  # The function should accept (request, context, state) and return:
  #   - A string (model ID) for simple routing
  #   - A dict with "primary", "shadow", "metadata" keys
  #   - A RoutingDecision object
  routing_callback: my_router.algorithm:route_request
  
  # Callback function for outcome feedback (optional)
  # Format: "module.path:function_name"
  # The function receives (OutcomeEvent, state) after each document evaluation
  # Used for online learning in adaptive mode
  outcome_callback: my_router.algorithm:update_from_outcome
  
  # Initial state passed to callbacks (optional)
  initial_state:
    epsilon: 0.1
    model_scores:
      small_model: 0.5
      large_model: 0.5
